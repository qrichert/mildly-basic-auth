<!doctype html>
<!--
  Template placeholders use the uppercase names below between double
  braces, as shown in the markup. Text values are HTML-escaped.

  Configurable placeholders map to environment variables by adding the
  `MBA_TEMPLATE_` prefix:

  - `PAGE_LANGUAGE`: Document language (`<html lang="...">`).
  - `PAGE_TITLE`: Page title (`<title>...</title>`).
  - `PASSWORD_LABEL`: Password-field label (screen-reader-only in this
    template).
  - `PASSWORD_PLACEHOLDER`: Password-field placeholder.
  - `WRONG_PASSWORD_MESSAGE`: Error text after a failed login and blank
    otherwise (screen-reader-only in this template).
  - `SUBMIT_BUTTON_TEXT`: Form submit button text.

  Generated login-state placeholders are set internally:

  - `_IS_PASSWORD_INVALID`: Literal `true` after a failed login and
    `false` otherwise.
  - `_PASSWORD_AUTOFOCUS_ATTRIBUTE`: Complete `autofocus` attribute
    after a failed login and blank otherwise.

  Templates may omit any placeholder. Unknown placeholders are preserved
  unchanged.

  Documentation: https://github.com/qrichert/mildly-basic-auth.
-->
<html lang="{{PAGE_LANGUAGE}}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>{{PAGE_TITLE}}</title>
    <!--
      No external resources: the unauthenticated wall must not phone home
      (leaking the visitor IP and protected origin before login).
    -->
    <style>
      :root {
        --background: oklch(1 0 0);
        --foreground: oklch(0.141 0.005 285.823);
        --primary: oklch(0.21 0.006 285.885);
        --primary-foreground: oklch(0.985 0 0);
        --muted-foreground: oklch(0.552 0.016 285.938);
        --border: oklch(0.92 0.004 286.32);
        --input: oklch(0.92 0.004 286.32);
        --ring: oklch(0.705 0.015 286.067);
        --destructive: oklch(0.577 0.245 27.325);
        --radius: 0.625rem;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: oklch(0.141 0.005 285.823);
          --foreground: oklch(0.985 0 0);
          --primary: oklch(0.92 0.004 286.32);
          --primary-foreground: oklch(0.21 0.006 285.885);
          --muted-foreground: oklch(0.705 0.015 286.067);
          --border: oklch(1 0 0 / 10%);
          --input: oklch(1 0 0 / 15%);
          --ring: oklch(0.552 0.016 285.938);
          --destructive: oklch(0.704 0.191 22.216);
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        border-color: var(--border);
      }

      html {
        min-height: 100%;
        color-scheme: light;
        -webkit-text-size-adjust: 100%;
      }

      body {
        min-height: 100svh;
        margin: 0;
        background: var(--background);
        color: var(--foreground);
        font-family: system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
      }

      .page {
        display: flex;
        min-height: 100svh;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        padding: 1.5rem;
      }

      .panel {
        display: flex;
        width: 100%;
        max-width: 24rem;
        flex-direction: column;
        gap: 1.5rem;
      }

      .lock {
        width: 1.5rem;
        height: 1.5rem;
        margin: 0 auto;
        color: var(--foreground);
      }

      .form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .field {
        /* Positioning context for the absolutely-placed status icon. */
        position: relative;
      }

      .input {
        display: flex;
        width: 100%;
        min-width: 0;
        height: 2.75rem;
        border: 1px solid var(--input);
        border-radius: calc(var(--radius) - 2px);
        background: transparent;
        padding: 0.5rem 0.75rem;
        color: var(--foreground);
        font-size: 1rem;
        line-height: 1.5rem;
        outline: none;
        box-shadow: 0 1px 2px rgb(0 0 0 / 5%);
        transition:
          color 150ms ease,
          box-shadow 150ms ease,
          border-color 150ms ease;
      }

      .input::placeholder {
        color: var(--muted-foreground);
      }

      .input:focus-visible {
        border-color: var(--ring);
        box-shadow: 0 0 0 3px color-mix(in oklch, var(--ring), transparent 50%);
      }

      /*
        Trailing alert icon. Absolute + hidden by default, so revealing
        it on the error wall shifts no layout: the button never moves.
      */
      .alert {
        position: absolute;
        inset-inline-end: 0.75rem;
        top: 50%;
        width: 1.25rem;
        height: 1.25rem;
        transform: translateY(-50%);
        display: none;
        color: var(--destructive);
        pointer-events: none; /* Clicks fall through to the input. */
      }

      .input[aria-invalid="true"] {
        /*
          Reserve room so masked text can't slide under the icon. Scoped
          to the invalid state; content is left-aligned, so the normal
          wall is visually untouched.
        */
        padding-inline-end: 2.5rem;
        border-color: var(--destructive);
      }

      .input[aria-invalid="true"] + .alert {
        display: block;
      }

      /*
        Keep the invalid identity while retyping, instead of the neutral
        focus ring taking over. Same 50%-transparent ring as the neutral
        `.input:focus-visible`, for visual consistency. The ring is a
        soft outline; the full-contrast signal is the opaque red border
        (plus the alert icon), so the translucent ring is fine.
      */
      .input[aria-invalid="true"]:focus-visible {
        border-color: var(--destructive);
        box-shadow: 0 0 0 3px
          color-mix(in oklch, var(--destructive), transparent 50%);
      }

      .button {
        display: inline-flex;
        width: 100%;
        height: 2.75rem;
        cursor: pointer;
        user-select: none;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        border: 1px solid transparent;
        border-radius: calc(var(--radius) - 2px);
        background: var(--primary);
        color: var(--primary-foreground);
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.25rem;
        outline: none;
        box-shadow: 0 1px 2px rgb(0 0 0 / 5%);
        -webkit-tap-highlight-color: transparent;
        transition:
          background-color 150ms ease,
          border-color 150ms ease,
          box-shadow 150ms ease,
          color 150ms ease;
      }

      .button:hover {
        background: color-mix(in oklch, var(--primary), transparent 3%);
      }

      .button:focus-visible {
        border-color: var(--ring);
        box-shadow: 0 0 0 3px color-mix(in oklch, var(--ring), transparent 50%);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (min-width: 48rem) {
        .page {
          padding: 2.5rem;
        }

        .input,
        .button {
          height: 2.25rem;
        }

        .input {
          padding-top: 0.25rem;
          padding-bottom: 0.25rem;
          font-size: 0.875rem;
          line-height: 1.25rem;
        }
      }

      @media (prefers-color-scheme: dark) {
        html {
          color-scheme: dark;
        }

        .input {
          background-color: var(--input);
        }

        @supports (color: color-mix(in lab, red, red)) {
          .input {
            background-color: color-mix(
              in oklab,
              var(--input) 30%,
              transparent
            );
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="panel">
        <!-- Lock icon from Lucide (https://lucide.dev/icons/lock), ISC license. -->
        <svg
          class="lock"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <form class="form" method="post">
          <div class="field">
            <label class="sr-only" for="password">{{PASSWORD_LABEL}}</label>
            <!--
              The `_PASSWORD_AUTOFOCUS_ATTRIBUTE` placeholder below
              renders the complete `autofocus` attribute after a failed
              login and nothing otherwise. Leave it standalone because
              `autofocus=""` still enables autofocus.
            -->
            <input
              class="input"
              id="password"
              type="password"
              name="password"
              placeholder="{{PASSWORD_PLACEHOLDER}}"
              autocomplete="current-password"
              aria-describedby="password-error"
              aria-invalid="{{_IS_PASSWORD_INVALID}}"
              {{_PASSWORD_AUTOFOCUS_ATTRIBUTE}}
              required
            />
            <!--
              Trailing alert icon, revealed via CSS only when the input
              is `aria-invalid="true"`. `aria-hidden` because its meaning
              is carried in text by `#password-error` below.
            -->
            <!-- Alert icon from Lucide (https://lucide.dev/icons/circle-alert), ISC license. -->
            <svg
              class="alert"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" x2="12" y1="8" y2="12"></line>
              <line x1="12" x2="12.01" y1="16" y2="16"></line>
            </svg>
            <!--
              Failed-login text, exposed to assistive tech via
              `aria-describedby` above. Empty on the normal wall, so no
              description and nothing is announced.
            -->
            <span class="sr-only" id="password-error">
              {{WRONG_PASSWORD_MESSAGE}}
            </span>
          </div>
          <button class="button" type="submit">{{SUBMIT_BUTTON_TEXT}}</button>
        </form>
      </div>
    </main>
  </body>
</html>

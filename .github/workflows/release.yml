name: Release

on:
  push:
    tags:
      - '*.*.*'

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full tag annotation.

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Just
        uses: taiki-e/install-action@just

      - name: Cache cargo and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-
            ${{ runner.os }}-

      - name: Build release binary
        run: just build

      - name: Prepare artifact
        run: |
          mkdir -p dist/
          bin=$(just ci-bin-name)
          platform=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          cp "target/release/$bin" "dist/${bin}-${{ github.ref_name }}-${platform}"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ runner.os }}
          path: dist/
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # `actions/checkout@v6` somehow transforms annotated tags into
      # lightweight tags, which prevents us from reading release notes.
      # This fetches annotated tags and overrides existing mangled tags.
      - name: Fetch annotated tags
        run: git fetch --tags --force

      - name: Extract tag annotation
        id: tag
        run: |
          title=$(git tag -l --format='%(contents:subject)' ${{ github.ref_name }})
          body=$(git tag -l --format='%(contents:body)' ${{ github.ref_name }})
          echo "title=$title" >> $GITHUB_OUTPUT
          echo 'body<<EOF' >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      # Docker's `build-push-action` also uploads a `.dockerbuild` record.
      # `download-artifact` cannot extract it, so select only the binary
      # artifacts prefixed with the repository name.
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: ${{ github.event.repository.name }}-*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.tag.outputs.title }}
          body: ${{ steps.tag.outputs.body }}
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Independent of the binary release. Needs the `DOCKERHUB_USERNAME` and
  # `DOCKERHUB_TOKEN` repository secrets. Docker Hub auth is via those
  # secrets, so no `packages:` scope is required.
  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            qrichert/mildly-basic-auth:${{ github.ref_name }}
            qrichert/mildly-basic-auth:latest
